name: 🚀 Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 📦 Build & Release
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ⚡ Gradle cache
      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      # 🔑 Grant permission
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🔐 Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          # Verify keystore exists
          if [ ! -f keystore.jks ]; then
            echo "❌ Keystore decoding failed!"
            exit 1
          fi

      # 🏗 Build APK + AAB
      - name: Build Release
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 🔍 List built artifacts (for debugging)
      - name: List Build Outputs
        run: |
          echo "📱 APKs:"
          find . -name "*.apk" -type f
          echo "📦 AABs:"
          find . -name "*.aab" -type f

      # 📦 Collect outputs
      - name: Collect Artifacts
        run: |
          mkdir -p release
          find . -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release/ \;

      # 🏷 Rename APKs & AABs nicely
      - name: Rename Artifacts
        run: |
          for file in release/*.apk; do
            if [ -f "$file" ]; then
              mv "$file" "release/ghostcaller-${GITHUB_REF_NAME}-$(basename "$file")"
            fi
          done
          for file in release/*.aab; do
            if [ -f "$file" ]; then
              mv "$file" "release/ghostcaller-${GITHUB_REF_NAME}-$(basename "$file")"
            fi
          done

      # 📝 Get commit message
      - name: Get Commit Message
        id: commit
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 🚀 Create Release and Upload Artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "👻 Ghost Caller ${{ github.ref_name }}"
          body: |
            🚀 **Release ${{ github.ref_name }}**

            📝 **Changes:**
            ${{ steps.commit.outputs.msg }}

            📦 **Builds Included:**
            - Universal APK
            - ABI-specific APKs
            - Android App Bundle (AAB)
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
