name: 🚀 Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 📦 Build & Release
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ⚡ Gradle cache
      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      # 🔑 Grant permission
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🔐 Decode keystore (FIXED PATH)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

          if [ ! -f app/keystore.jks ]; then
            echo "❌ Keystore decoding failed!"
            exit 1
          fi

      # 🏗 Build APK + AAB
      - name: 🏗 Build Release
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PKEYSTORE_FILE=keystore.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      # 🔍 Debug outputs (cleaner)
      - name: List Build Outputs
        run: |
          echo "📱 APK outputs:"
          ls app/build/outputs/apk/release || true
          echo "📦 AAB outputs:"
          ls app/build/outputs/bundle/release || true

      # 📦 Collect ONLY valid outputs (faster & safe)
      - name: Collect Artifacts
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/ 2>/dev/null || true
          cp app/build/outputs/bundle/release/*.aab release/ 2>/dev/null || true

      # 🏷 Rename nicely
      - name: Rename Artifacts
        run: |
          for file in release/*; do
            if [ -f "$file" ]; then
              mv "$file" "release/ghostcaller-${GITHUB_REF_NAME}-$(basename "$file")"
            fi
          done

      # 📝 Commit message
      - name: Get Commit Message
        id: commit
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 🚀 Create Release + Upload
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "👻 Ghost Caller ${{ github.ref_name }}"
          body: |
            🚀 **Release ${{ github.ref_name }}**

            📝 **Changes:**
            ${{ steps.commit.outputs.msg }}

            📦 **Included:**
            - Universal APK
            - ABI APKs
            - AAB (Play Store)
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
