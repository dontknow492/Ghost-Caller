name: 🚀 Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 📦 Build & Release
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ⚡ Gradle cache
      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      # 🔑 Grant permission
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🔐 Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # 🏗 Build APK + AAB
      - name: Build Release
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 📦 Collect outputs
      - name: Collect Artifacts
        run: |
          mkdir release
          find . -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release/ \;

      # 🏷 Rename APKs nicely
      - name: Rename APKs
        run: |
          for file in release/*.apk; do
            mv "$file" "release/ghostcaller-${GITHUB_REF_NAME}-$(basename $file)"
          done

      # 📝 Get commit message
      - name: Get Commit Message
        id: commit
        run: |
          echo "msg=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      # 🚀 Create Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "👻 Ghost Caller ${{ github.ref_name }}"
          body: |
            🚀 **Release ${{ github.ref_name }}**

            📝 **Changes:**
            ${{ steps.commit.outputs.msg }}

            📦 **Builds Included:**
            - Universal APK
            - ABI-specific APKs
            - Android App Bundle (AAB)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📤 Upload files
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}